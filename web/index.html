<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1e1e1e; --bg2: #252526; --bg3: #2d2d2d; --bg4: #3c3c3c;
            --text: #d4d4d4; --text2: #808080;
            --accent: #007acc; --accent2: #0098ff; --danger: #f44747;
            --success: #6a9955; --warning: #cca700;
            --mono: 'Consolas', 'Monaco', 'Courier New', monospace;
            --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        :root.light {
            --bg: #ffffff; --bg2: #f3f3f3; --bg3: #e8e8e8; --bg4: #d4d4d4;
            --text: #333333; --text2: #666666;
            --accent: #0066b8; --accent2: #0078d4; --danger: #d32f2f;
        }
        html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); }
        #app { display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 6px 16px; background: var(--bg2); border-bottom: 1px solid var(--bg4); }
        header h1 { font-size: 1.1rem; }
        .header-btns { display: flex; gap: 6px; }
        header button, .btn { padding: 5px 14px; border: none; border-radius: 3px; background: var(--accent); color: white; cursor: pointer; font-size: 0.85rem; }
        header button:hover, .btn:hover { opacity: 0.85; }
        header button.secondary { background: var(--bg4); color: var(--text); }
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--bg4); display: flex; flex-direction: column; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-bottom: 1px solid var(--bg4); }
        .sidebar-header h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text2); letter-spacing: 0.5px; }
        #file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
        .file-item { display: flex; align-items: center; padding: 3px 12px; cursor: pointer; font-size: 0.85rem; user-select: none; }
        .file-item:hover { background: var(--bg3); }
        .file-item .icon { margin-right: 6px; font-size: 0.9rem; }
        .file-item .name { flex: 1; }
        .file-item.dir { color: var(--accent2); }
        .ctx-menu { display: none; position: fixed; background: var(--bg2); border: 1px solid var(--bg4); border-radius: 4px; padding: 4px 0; z-index: 1000; min-width: 150px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .ctx-menu.active { display: block; }
        .ctx-item { padding: 5px 16px; cursor: pointer; font-size: 0.85rem; }
        .ctx-item:hover { background: var(--accent); color: white; }
        .ctx-sep { height: 1px; background: var(--bg4); margin: 3px 0; }
        #work-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #editor { flex: 1; display: flex; flex-direction: column; }
        .editor-bar { display: flex; justify-content: space-between; align-items: center; padding: 4px 12px; background: var(--bg3); border-bottom: 1px solid var(--bg4); font-size: 0.75rem; color: var(--text2); }
        #code { flex: 1; width: 100%; padding: 12px; border: none; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.6; resize: none; outline: none; tab-size: 4; }
        #terminal { height: 220px; background: var(--bg); border-top: 1px solid var(--bg4); display: flex; flex-direction: column; }
        .term-bar { display: flex; justify-content: space-between; align-items: center; padding: 3px 12px; background: var(--bg3); border-bottom: 1px solid var(--bg4); }
        .term-bar h4 { font-size: 0.7rem; text-transform: uppercase; color: var(--text2); }
        .term-bar button { padding: 1px 8px; border: none; border-radius: 2px; background: var(--bg4); color: var(--text); cursor: pointer; font-size: 0.7rem; }
        #term-output { flex: 1; overflow-y: auto; padding: 8px 12px; font-family: var(--mono); font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
        .term-input { display: flex; align-items: center; padding: 4px 12px; border-top: 1px solid var(--bg4); }
        .term-input .prompt { color: var(--accent); font-family: var(--mono); margin-right: 8px; font-weight: bold; }
        .term-input input { flex: 1; border: none; background: transparent; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; }
        .stdout { color: var(--text); } .stderr { color: var(--danger); } .info { color: var(--accent2); }
        #resize-handle { height: 3px; background: var(--bg4); cursor: ns-resize; }
        #resize-handle:hover { background: var(--accent); }
        footer { display: flex; justify-content: space-between; padding: 3px 16px; background: var(--accent); color: white; font-size: 0.7rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-box { background: var(--bg2); border: 1px solid var(--bg4); border-radius: 6px; padding: 20px; min-width: 350px; max-width: 500px; }
        .modal-title { font-size: 1rem; margin-bottom: 16px; }
        .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .form-row label { font-size: 0.85rem; color: var(--text2); }
        .form-row input, .form-row select { padding: 5px 8px; background: var(--bg); border: 1px solid var(--bg4); border-radius: 3px; color: var(--text); font-size: 0.85rem; }
        .form-row input[type="number"] { width: 90px; }
        .form-section { font-size: 0.75rem; text-transform: uppercase; color: var(--accent); margin: 12px 0 8px; letter-spacing: 0.5px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
        .modal-btns button { padding: 6px 18px; border: none; border-radius: 3px; cursor: pointer; font-size: 0.85rem; }
        .btn-ok { background: var(--accent); color: white; }
        .btn-cancel { background: var(--bg4); color: var(--text); }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>🐟 Koi</h1>
            <div class="header-btns">
                <button onclick="runCode()" title="Ctrl+Enter" data-i18n="btn_run">▶ Run</button>
                <button onclick="clearTerminal()" class="secondary" data-i18n="btn_clear">Clear</button>
                <button onclick="openSettings()" class="secondary" data-i18n="btn_settings">⚙ Settings</button>
            </div>
        </header>
        <main>
            <aside id="sidebar">
                <div class="sidebar-header"><h3 data-i18n="sidebar_files">Files</h3></div>
                <div id="file-tree"></div>
            </aside>
            <div id="work-area">
                <div id="editor">
                    <div class="editor-bar">
                        <span>untitled.lua</span>
                        <span id="cursor-pos" data-i18n="cursor_fmt">Ln 1, Col 1</span>
                    </div>
                    <textarea id="code" spellcheck="false"></textarea>
                </div>
                <div id="resize-handle"></div>
                <div id="terminal">
                    <div class="term-bar">
                        <h4 data-i18n="term_title">Terminal</h4>
                        <button onclick="clearTerminal()" data-i18n="btn_clear">Clear</button>
                    </div>
                    <div id="term-output"></div>
                    <div class="term-input">
                        <span class="prompt">></span>
                        <input type="text" id="shell-input" data-i18n-placeholder="shell_placeholder" autocomplete="off">
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <span id="status" data-i18n="status_ready">Ready</span>
            <span>Koi v0.0.1-Alpha</span>
        </footer>
    </div>

    <div id="ctx-menu" class="ctx-menu">
        <div class="ctx-item" onclick="ctxNewFile()" data-i18n="ctx_new_file">📄 New File</div>
        <div class="ctx-item" onclick="ctxNewDir()" data-i18n="ctx_new_dir">📁 New Directory</div>
        <div class="ctx-sep"></div>
        <div class="ctx-item" onclick="ctxDelete()" data-i18n="ctx_delete">🗑️ Delete</div>
    </div>

    <div id="input-modal" class="modal">
        <div class="modal-box">
            <div class="modal-title" id="input-title"></div>
            <input type="text" id="input-value" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--bg4);border-radius:3px;color:var(--text);font-size:0.9rem" autocomplete="off">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeInputModal()" data-i18n="btn_cancel">Cancel</button>
                <button class="btn-ok" onclick="confirmInputModal()" data-i18n="btn_ok">OK</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-box" style="min-width:420px">
            <div class="modal-title" data-i18n="settings_title">⚙ Settings</div>

            <div class="form-section" data-i18n="settings_security">Security</div>
            <div class="form-row"><label data-i18n="settings_timeout">Max Timeout (s)</label><input type="number" id="s-timeout" value="60"></div>
            <div class="form-row"><label data-i18n="settings_matrix">Max Matrix Size</label><input type="number" id="s-matrix" value="10000"></div>
            <div class="form-row"><label data-i18n="settings_tensor">Max Tensor Dims</label><input type="number" id="s-tensor" value="8"></div>

            <div class="form-section" data-i18n="settings_engine">Engine</div>
            <div class="form-row"><label data-i18n="settings_edition">Edition</label>
                <select id="s-edition"><option value="full">Full</option><option value="lite">Lite</option></select>
            </div>

            <div class="form-section" data-i18n="settings_ui">Interface</div>
            <div class="form-row"><label data-i18n="settings_theme">Theme</label>
                <select id="s-theme"><option value="dark" data-i18n="theme_dark">Dark</option><option value="light" data-i18n="theme_light">Light</option></select>
            </div>
            <div class="form-row"><label data-i18n="settings_fontsize">Font Size</label><input type="number" id="s-fontsize" value="14"></div>
            <div class="form-row"><label data-i18n="settings_lang">Language</label>
                <select id="s-lang"><option value="en">English</option><option value="zh">中文</option></select>
            </div>

            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeSettings()" data-i18n="btn_cancel">Cancel</button>
                <button class="btn-ok" onclick="saveSettings()" data-i18n="btn_save">Save</button>
            </div>
        </div>
    </div>

    <script>
        // === i18n ===
        const i18n = {
            en: {
                title: 'Koi — Computation OS',
                btn_run: '▶ Run', btn_clear: 'Clear', btn_settings: '⚙ Settings',
                btn_cancel: 'Cancel', btn_ok: 'OK', btn_save: 'Save',
                sidebar_files: 'Files', term_title: 'Terminal',
                shell_placeholder: 'Enter Lua expression... (↑↓ history, Tab complete, help)',
                status_ready: 'Ready', status_running: 'Running...',
                status_saved: 'Settings saved',
                ctx_new_file: '📄 New File', ctx_new_dir: '📁 New Directory', ctx_delete: '🗑️ Delete',
                settings_title: '⚙ Settings',
                settings_security: 'Security', settings_engine: 'Engine', settings_ui: 'Interface',
                settings_timeout: 'Max Timeout (s)', settings_matrix: 'Max Matrix Size',
                settings_tensor: 'Max Tensor Dims', settings_edition: 'Edition',
                settings_theme: 'Theme', settings_fontsize: 'Font Size', settings_lang: 'Language',
                theme_dark: 'Dark', theme_light: 'Light',
                cursor_fmt: 'Ln {ln}, Col {col}',
                confirm_delete: 'Delete {name}?',
                net_error: 'Network error: ',
                input_new_file: 'New File', input_new_dir: 'New Directory',
                help_text: `Commands:
  help                  Show this help
  clear                 Clear terminal

Filesystem:
  fs.mkdir("/path")           Create directory
  fs.write("/path", val)      Write value
  fs.read("/path")            Read value
  fs.ls("/path")              List contents
  fs.rm("/path")              Delete
  fs.exists("/path")          Check existence

Matrix:
  math.mat_new("/data/A", 2, 2, {1,2,3,4})
  math.mat_mul("/data/A", "/data/B", "/data/C")
  math.mat_transpose("/data/A", "/data/AT")
  math.mat_determinant("/data/A")
  math.mat_inverse("/data/A", "/data/AI")
  math.mat_print("/data/A")
  math.mat_shape("/data/A")

Vector:
  math.dot({1,2,3}, {4,5,6})     Dot product
  math.norm({1,2,3})             Norm
  math.cross({1,0,0}, {0,1,0})   Cross product (3D)

Note: Paths must be quoted!
  ✗ fs.mkdir(test)
  ✓ fs.mkdir("/test")`,
            },
            zh: {
                title: 'Koi — 计算操作系统',
                btn_run: '▶ 运行', btn_clear: '清空', btn_settings: '⚙ 设置',
                btn_cancel: '取消', btn_ok: '确定', btn_save: '保存',
                sidebar_files: '文件', term_title: '终端',
                shell_placeholder: '输入 Lua 表达式... (↑↓ 历史, Tab 补全, help 帮助)',
                status_ready: '就绪', status_running: '运行中...',
                status_saved: '设置已保存',
                ctx_new_file: '📄 新建文件', ctx_new_dir: '📁 新建目录', ctx_delete: '🗑️ 删除',
                settings_title: '⚙ 设置',
                settings_security: '安全', settings_engine: '引擎', settings_ui: '界面',
                settings_timeout: '最大超时 (秒)', settings_matrix: '最大矩阵维度',
                settings_tensor: '最大张量维度', settings_edition: '版本',
                settings_theme: '主题', settings_fontsize: '字体大小', settings_lang: '语言',
                theme_dark: '深色', theme_light: '浅色',
                cursor_fmt: '行 {ln}, 列 {col}',
                confirm_delete: '确定删除 {name}？',
                net_error: '网络错误: ',
                input_new_file: '新建文件', input_new_dir: '新建目录',
                help_text: `命令:
  help                  显示帮助
  clear                 清空终端

文件系统:
  fs.mkdir("/path")           创建目录
  fs.write("/path", val)      写入值
  fs.read("/path")            读取值
  fs.ls("/path")              列出内容
  fs.rm("/path")              删除
  fs.exists("/path")          检查存在

矩阵:
  math.mat_new("/data/A", 2, 2, {1,2,3,4})
  math.mat_mul("/data/A", "/data/B", "/data/C")
  math.mat_transpose("/data/A", "/data/AT")
  math.mat_determinant("/data/A")
  math.mat_inverse("/data/A", "/data/AI")
  math.mat_print("/data/A")
  math.mat_shape("/data/A")

向量:
  math.dot({1,2,3}, {4,5,6})     点积
  math.norm({1,2,3})             范数
  math.cross({1,0,0}, {0,1,0})   叉积

注意: 路径必须用引号包裹！
  ✗ fs.mkdir(test)
  ✓ fs.mkdir("/test")`,
        };

        let lang = localStorage.getItem('koi-lang') || 'en';
        let T = i18n[lang];

        function t(key, vars) {
            let s = T[key] || i18n.en[key] || key;
            if (vars) Object.entries(vars).forEach(([k, v]) => s = s.replace(`{${k}}`, v));
            return s;
        }

        function applyLang() {
            T = i18n[lang];
            document.title = t('title');
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = t(el.dataset.i18n);
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                el.placeholder = t(el.dataset.i18nPlaceholder);
            });
        }

        // === Globals ===
        const codeEl = document.getElementById('code');
        const outputEl = document.getElementById('term-output');
        const shellInput = document.getElementById('shell-input');
        const statusEl = document.getElementById('status');
        let ctxTarget = null;

        // Default code
        codeEl.value = `-- Koi 0.0.1-Alpha
c = 299792458
G = 6.67430e-11

math.mat_new('/data/A', 3, 3, {1,2,3, 4,5,6, 7,8,9})
io.print(math.mat_print('/data/A'))
io.print('Shape: ' .. table.concat(math.mat_shape('/data/A'), 'x'))`;

        // === Shell ===
        const history = [];
        let historyIdx = -1;
        const completions = [
            'fs.mkdir(', 'fs.write(', 'fs.read(', 'fs.ls(', 'fs.rm(', 'fs.exists(',
            'math.mat_new(', 'math.mat_mul(', 'math.mat_transpose(', 'math.mat_determinant(',
            'math.mat_inverse(', 'math.mat_print(', 'math.mat_shape(',
            'math.tensor_new(', 'math.tensor_print(', 'math.tensor_shape(',
            'math.dot(', 'math.norm(', 'math.cross(',
            'io.print(', 'os.time()', 'os.clock()', 'os.version()', 'os.edition()',
        ];

        shellInput.addEventListener('keydown', async function(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIdx < history.length - 1) { historyIdx++; this.value = history[history.length - 1 - historyIdx]; }
                return;
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIdx > 0) { historyIdx--; this.value = history[history.length - 1 - historyIdx]; }
                else { historyIdx = -1; this.value = ''; }
                return;
            }
            if (e.key === 'Tab') {
                e.preventDefault();
                const match = completions.find(c => c.startsWith(this.value) && c !== this.value);
                if (match) this.value = match;
                return;
            }
            if (e.key === 'Enter') {
                const code = this.value.trim();
                this.value = '';
                historyIdx = -1;
                if (!code) return;
                if (code !== history[history.length - 1]) history.push(code);
                if (code === 'help') { appendOutput(t('help_text'), 'info'); return; }
                if (code === 'clear') { clearTerminal(); return; }
                appendOutput('> ' + code, 'info');
                try {
                    const r = await apiExecute(code);
                    if (r.error) appendOutput(r.error, 'stderr');
                    else if (r.output) appendOutput(r.output, 'stdout');
                } catch (e) { appendOutput(t('net_error') + e.message, 'stderr'); }
            }
        });

        // === Editor ===
        codeEl.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const s = this.selectionStart;
                this.value = this.value.substring(0, s) + '    ' + this.value.substring(this.selectionEnd);
                this.selectionStart = this.selectionEnd = s + 4;
            }
            if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); runCode(); }
        });
        codeEl.addEventListener('click', updateCursor);
        codeEl.addEventListener('keyup', updateCursor);
        function updateCursor() {
            const v = codeEl.value.substring(0, codeEl.selectionStart);
            const ln = (v.match(/\n/g) || []).length + 1;
            const col = v.length - v.lastIndexOf('\n');
            document.getElementById('cursor-pos').textContent = t('cursor_fmt', {ln, col});
        }

        // === API ===
        async function apiExecute(code) {
            const r = await fetch('/api/lua/execute', { method: 'POST', body: code });
            return r.json();
        }

        async function runCode() {
            const code = codeEl.value.trim();
            if (!code) return;
            statusEl.textContent = t('status_running');
            appendOutput('> run', 'info');
            try {
                const r = await apiExecute(code);
                if (r.error) appendOutput(r.error, 'stderr');
                else if (r.output) appendOutput(r.output, 'stdout');
            } catch (e) { appendOutput(t('net_error') + e.message, 'stderr'); }
            statusEl.textContent = t('status_ready');
        }

        function appendOutput(text, cls) {
            const span = document.createElement('span');
            span.className = cls || '';
            span.textContent = text + '\n';
            outputEl.appendChild(span);
            outputEl.scrollTop = outputEl.scrollHeight;
        }
        function clearTerminal() { outputEl.innerHTML = ''; }

        // === File Tree ===
        let currentPath = '/';
        async function loadFiles(path) {
            currentPath = path || '/';
            try {
                const r = await fetch('/api/filesystem' + currentPath);
                const d = await r.json();
                const tree = document.getElementById('file-tree');
                tree.innerHTML = '';
                if (currentPath !== '/') {
                    const up = document.createElement('div');
                    up.className = 'file-item dir';
                    up.innerHTML = '<span class="icon">⬆</span><span class="name">..</span>';
                    up.onclick = () => loadFiles(currentPath.replace(/\/[^\/]+\/?$/, '') || '/');
                    tree.appendChild(up);
                }
                if (d.children) {
                    d.children.forEach(item => {
                        const el = document.createElement('div');
                        el.className = 'file-item' + (item.type === 'dir' ? ' dir' : '');
                        el.innerHTML = `<span class="icon">${item.type === 'dir' ? '📁' : '📄'}</span><span class="name">${esc(item.name)}</span>`;
                        el.onclick = () => { if (item.type === 'dir') loadFiles(item.key); };
                        el.oncontextmenu = (e) => showCtxMenu(e, item);
                        tree.appendChild(el);
                    });
                }
            } catch (e) {}
        }

        function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        // === Context Menu ===
        function showCtxMenu(e, item) {
            e.preventDefault();
            ctxTarget = item;
            const menu = document.getElementById('ctx-menu');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            menu.classList.add('active');
        }
        document.addEventListener('click', () => document.getElementById('ctx-menu').classList.remove('active'));

        function ctxNewFile() {
            openInputModal(t('input_new_file'), '', async (name) => {
                await apiExecute(`fs.write("${ctxTarget.key}/${name}", "")`);
                loadFiles(currentPath);
            });
        }
        function ctxNewDir() {
            openInputModal(t('input_new_dir'), '', async (name) => {
                await apiExecute(`fs.mkdir("${ctxTarget.key}/${name}")`);
                loadFiles(currentPath);
            });
        }
        function ctxDelete() {
            if (confirm(t('confirm_delete', {name: ctxTarget.name}))) {
                apiExecute(`fs.rm("${ctxTarget.key}")`).then(() => loadFiles(currentPath));
            }
        }

        // === Modals ===
        let inputCb = null;
        function openInputModal(title, val, cb) {
            document.getElementById('input-title').textContent = title;
            document.getElementById('input-value').value = val;
            document.getElementById('input-modal').classList.add('active');
            document.getElementById('input-value').focus();
            inputCb = cb;
        }
        function closeInputModal() { document.getElementById('input-modal').classList.remove('active'); }
        function confirmInputModal() {
            const v = document.getElementById('input-value').value.trim();
            if (v && inputCb) inputCb(v);
            closeInputModal();
        }
        document.getElementById('input-value').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmInputModal();
            if (e.key === 'Escape') closeInputModal();
        });

        // === Resize ===
        let resizing = false;
        document.getElementById('resize-handle').addEventListener('mousedown', (e) => { resizing = true; e.preventDefault(); });
        document.addEventListener('mousemove', (e) => {
            if (!resizing) return;
            document.getElementById('terminal').style.height = Math.max(80, Math.min(500, window.innerHeight - e.clientY - 28)) + 'px';
        });
        document.addEventListener('mouseup', () => { resizing = false; });

        // === Theme ===
        function applyTheme(theme) {
            document.documentElement.classList.toggle('light', theme === 'light');
        }

        // === Settings ===
        async function openSettings() {
            try {
                const r = await fetch('/api/settings');
                const c = await r.json();
                document.getElementById('s-timeout').value = c.security?.max_timeout || 60;
                document.getElementById('s-matrix').value = c.security?.max_matrix_size || 10000;
                document.getElementById('s-tensor').value = c.security?.max_tensor_ndim || 8;
                document.getElementById('s-edition').value = c.engine?.edition || 'full';
                document.getElementById('s-theme').value = c.ui?.theme || 'dark';
                document.getElementById('s-fontsize').value = c.ui?.font_size || 14;
                document.getElementById('s-lang').value = lang;
            } catch (e) {}
            document.getElementById('settings-modal').classList.add('active');
        }
        function closeSettings() { document.getElementById('settings-modal').classList.remove('active'); }
        async function saveSettings() {
            const theme = document.getElementById('s-theme').value;
            const newLang = document.getElementById('s-lang').value;
            const cfg = {
                security: {
                    max_timeout: parseInt(document.getElementById('s-timeout').value),
                    max_matrix_size: parseInt(document.getElementById('s-matrix').value),
                    max_tensor_ndim: parseInt(document.getElementById('s-tensor').value),
                },
                engine: { edition: document.getElementById('s-edition').value },
                ui: { theme, font_size: parseInt(document.getElementById('s-fontsize').value), lang: newLang },
            };
            try { await fetch('/api/settings/update', { method: 'POST', body: JSON.stringify(cfg) }); } catch (e) {}
            applyTheme(theme);
            lang = newLang;
            localStorage.setItem('koi-lang', lang);
            applyLang();
            codeEl.style.fontSize = cfg.ui.font_size + 'px';
            shellInput.style.fontSize = cfg.ui.font_size + 'px';
            closeSettings();
            statusEl.textContent = t('status_saved');
        }

        // Init
        (async () => {
            try {
                const r = await fetch('/api/settings');
                const c = await r.json();
                applyTheme(c.ui?.theme || 'dark');
                if (c.ui?.lang) { lang = c.ui.lang; localStorage.setItem('koi-lang', lang); }
            } catch (e) {}
            applyLang();
            loadFiles('/');
        })();
    </script>
</body>
</html>
