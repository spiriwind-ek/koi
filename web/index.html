<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koi — Computation OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
            --text: #e0e0e0; --accent: #e94560; --accent2: #533483;
            --mono: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        html, body { height: 100%; font-family: sans-serif; background: var(--bg); color: var(--text); }
        #app { display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--bg3); }
        header h1 { font-size: 1.2rem; }
        .header-btns { display: flex; gap: 8px; }
        header button { padding: 6px 16px; border: none; border-radius: 4px; background: var(--accent); color: white; cursor: pointer; font-size: 0.9rem; }
        header button:hover { opacity: 0.8; }
        header button.secondary { background: var(--accent2); }
        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 200px; background: var(--bg2); border-right: 1px solid var(--bg3); overflow-y: auto; padding: 8px; }
        #sidebar h3 { font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; color: #888; }
        .file-item { padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 0.85rem; }
        .file-item:hover { background: var(--bg3); }
        #editor-panel { flex: 1; display: flex; flex-direction: column; }
        #editor { flex: 1; background: var(--bg); }
        #code { width: 100%; height: 100%; padding: 16px; border: none; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.6; resize: none; outline: none; tab-size: 4; }
        #console { width: 400px; background: var(--bg2); border-left: 1px solid var(--bg3); display: flex; flex-direction: column; }
        #console h3 { padding: 8px 12px; font-size: 0.8rem; text-transform: uppercase; color: #888; border-bottom: 1px solid var(--bg3); }
        #output { flex: 1; overflow-y: auto; padding: 12px; font-family: var(--mono); font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
        .error { color: var(--accent); }
        .success { color: #4ecca3; }
        footer { display: flex; justify-content: space-between; padding: 4px 16px; background: var(--accent2); font-size: 0.75rem; }

        /* Settings Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg2); border-radius: 8px; padding: 24px; width: 500px; max-height: 80vh; overflow-y: auto; border: 1px solid var(--bg3); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 1.1rem; }
        .modal-close { background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        .setting-group { margin-bottom: 20px; }
        .setting-group h4 { font-size: 0.85rem; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-row label { font-size: 0.85rem; color: #aaa; }
        .setting-row input, .setting-row select { padding: 4px 8px; background: var(--bg); border: 1px solid var(--bg3); border-radius: 4px; color: var(--text); font-size: 0.85rem; }
        .setting-row input[type="number"] { width: 100px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
        .modal-footer button { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: var(--bg3); color: var(--text); }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>🐟 Koi</h1>
            <div class="header-btns">
                <button onclick="runCode()">▶ Run (Ctrl+Enter)</button>
                <button onclick="clearOutput()" class="secondary">Clear</button>
                <button onclick="openSettings()" class="secondary">⚙ Settings</button>
            </div>
        </header>
        <main>
            <aside id="sidebar">
                <h3>Files</h3>
                <div id="file-tree"></div>
            </aside>
            <section id="editor-panel">
                <div id="editor">
                    <textarea id="code" spellcheck="false">-- Koi 0.1.0-mvp
-- Lua computation environment

-- Define your own constants
c = 299792458
G = 6.67430e-11

-- Create a matrix
math.mat_new('/data/A', 3, 3, {1,2,3, 4,5,6, 7,8,9})

-- Print it
io.print(math.mat_print('/data/A'))

-- Shape
io.print('Shape: ' .. table.concat(math.mat_shape('/data/A'), 'x'))</textarea>
                </div>
            </section>
            <aside id="console">
                <h3>Output</h3>
                <div id="output"></div>
            </aside>
        </main>
        <footer>
            <span id="status">Ready</span>
            <span>Koi v0.1.0-mvp</span>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙ Settings</h2>
                <button class="modal-close" onclick="closeSettings()">&times;</button>
            </div>

            <div class="setting-group">
                <h4>Server</h4>
                <div class="setting-row">
                    <label>Listen Address</label>
                    <input type="text" id="s-server-listen" value=":8080">
                </div>
                <div class="setting-row">
                    <label>Timeout</label>
                    <input type="text" id="s-server-timeout" value="30s">
                </div>
            </div>

            <div class="setting-group">
                <h4>Database</h4>
                <div class="setting-row">
                    <label>Path</label>
                    <input type="text" id="s-db-path" value="./data/koi.db">
                </div>
            </div>

            <div class="setting-group">
                <h4>Security</h4>
                <div class="setting-row">
                    <label>Max Timeout (s)</label>
                    <input type="number" id="s-sec-timeout" value="60">
                </div>
                <div class="setting-row">
                    <label>Max Memory (bytes)</label>
                    <input type="number" id="s-sec-memory" value="1073741824">
                </div>
                <div class="setting-row">
                    <label>Max Matrix Size</label>
                    <input type="number" id="s-sec-matrix" value="10000">
                </div>
                <div class="setting-row">
                    <label>Max Tensor Dimensions</label>
                    <input type="number" id="s-sec-tensor" value="8">
                </div>
            </div>

            <div class="setting-group">
                <h4>Engine</h4>
                <div class="setting-row">
                    <label>Edition</label>
                    <select id="s-engine-edition">
                        <option value="full">Full</option>
                        <option value="lite">Lite</option>
                    </select>
                </div>
            </div>

            <div class="setting-group">
                <h4>UI</h4>
                <div class="setting-row">
                    <label>Theme</label>
                    <select id="s-ui-theme">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Font Size</label>
                    <input type="number" id="s-ui-fontsize" value="14">
                </div>
                <div class="setting-row">
                    <label>Tab Size</label>
                    <input type="number" id="s-ui-tabsize" value="4">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
                <button class="btn-save" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const codeEl = document.getElementById('code');
        const outputEl = document.getElementById('output');
        const statusEl = document.getElementById('status');

        codeEl.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                this.value = this.value.substring(0, start) + '    ' + this.value.substring(this.selectionEnd);
                this.selectionStart = this.selectionEnd = start + 4;
            }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                runCode();
            }
        });

        async function runCode() {
            const code = codeEl.value.trim();
            if (!code) return;
            statusEl.textContent = 'Running...';
            outputEl.innerHTML += '<span style="color:#888">> run</span>\n';
            try {
                const resp = await fetch('/api/lua/execute', { method: 'POST', body: code });
                const data = await resp.json();
                if (data.error) {
                    outputEl.innerHTML += '<span class="error">' + escapeHtml(data.error) + '</span>\n';
                } else if (data.output) {
                    outputEl.innerHTML += '<span class="success">' + escapeHtml(data.output) + '</span>\n';
                }
            } catch (err) {
                outputEl.innerHTML += '<span class="error">Network error: ' + escapeHtml(err.message) + '</span>\n';
            }
            outputEl.scrollTop = outputEl.scrollHeight;
            statusEl.textContent = 'Ready';
        }

        function clearOutput() { outputEl.innerHTML = ''; }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function loadFiles(path) {
            try {
                const resp = await fetch('/api/filesystem' + path);
                const data = await resp.json();
                if (data.children) {
                    const tree = document.getElementById('file-tree');
                    tree.innerHTML = '';
                    data.children.forEach(item => {
                        const el = document.createElement('div');
                        el.className = 'file-item';
                        el.textContent = (item.type === 'dir' ? '📁 ' : '📄 ') + item.name;
                        el.onclick = () => loadFiles(item.key);
                        tree.appendChild(el);
                    });
                }
            } catch (err) {}
        }

        // Settings
        async function openSettings() {
            try {
                const resp = await fetch('/api/settings');
                const cfg = await resp.json();
                document.getElementById('s-server-listen').value = cfg.Server?.Listen || ':8080';
                document.getElementById('s-server-timeout').value = cfg.Server?.Timeout || '30s';
                document.getElementById('s-db-path').value = cfg.Database?.Path || './data/koi.db';
                document.getElementById('s-sec-timeout').value = cfg.Security?.MaxTimeout || 60;
                document.getElementById('s-sec-memory').value = cfg.Security?.MaxMemory || 1073741824;
                document.getElementById('s-sec-matrix').value = cfg.Security?.MaxMatrixSize || 10000;
                document.getElementById('s-sec-tensor').value = cfg.Security?.MaxTensorNdim || 8;
                document.getElementById('s-engine-edition').value = cfg.Engine?.Edition || 'full';
                document.getElementById('s-ui-theme').value = cfg.UI?.Theme || 'dark';
                document.getElementById('s-ui-fontsize').value = cfg.UI?.FontSize || 14;
                document.getElementById('s-ui-tabsize').value = cfg.UI?.TabSize || 4;
            } catch (err) {}
            document.getElementById('settings-modal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('active');
        }

        async function saveSettings() {
            const cfg = {
                server: {
                    Listen: document.getElementById('s-server-listen').value,
                    Timeout: document.getElementById('s-server-timeout').value,
                },
                database: {
                    Path: document.getElementById('s-db-path').value,
                },
                security: {
                    MaxTimeout: parseInt(document.getElementById('s-sec-timeout').value),
                    MaxMemory: parseInt(document.getElementById('s-sec-memory').value),
                    MaxMatrixSize: parseInt(document.getElementById('s-sec-matrix').value),
                    MaxTensorNdim: parseInt(document.getElementById('s-sec-tensor').value),
                },
                engine: {
                    Edition: document.getElementById('s-engine-edition').value,
                },
                ui: {
                    Theme: document.getElementById('s-ui-theme').value,
                    FontSize: parseInt(document.getElementById('s-ui-fontsize').value),
                    TabSize: parseInt(document.getElementById('s-ui-tabsize').value),
                },
            };

            try {
                const resp = await fetch('/api/settings/update', {
                    method: 'POST',
                    body: JSON.stringify(cfg),
                });
                const data = await resp.json();
                if (data.status === 'ok') {
                    closeSettings();
                    statusEl.textContent = 'Settings saved';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        loadFiles('/');
    </script>
</body>
</html>
